<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DealSpot</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background-color: #f4f6f8;
      color: #1f2933;
    }

    header {
      background: white;
      padding: 18px 16px 10px 16px;
      text-align: center;
      font-size: 24px;
      font-weight: 700;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .nav {
      display: flex;
      gap: 10px;
      justify-content: center;
      padding: 12px;
      background: white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    .nav button {
      border: none;
      padding: 10px 16px;
      border-radius: 20px;
      background: #e5e7eb;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .nav button.active {
      background: #2563eb;
      color: white;
    }

    .nav button:active {
      transform: scale(0.96);
    }

    .search-container {
      padding: 14px;
    }

    .search-box {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid #d1d5db;
      font-size: 15px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
      outline: none;
    }

    .cards {
      padding: 10px 14px 30px 14px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 6px 14px rgba(0,0,0,0.08);
      transition: transform 0.15s ease;
    }

    .card:active {
      transform: scale(0.98);
    }

    .title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .city {
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .rating {
      font-size: 15px;
      font-weight: 600;
    }

    .badge {
      display: inline-block;
      background: #dc2626;
      color: white;
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 10px;
      margin-bottom: 8px;
      font-weight: 600;
    }
  </style>
</head>

<body>

  <header>DealSpot</header>

  <div class="nav">
    <button class="active">🏆 Top</button>
    <button>📋 Liste</button>
    <button>⭐ Avis</button>
    <button>➕ Ajouter</button>
  </div>

  <div class="search-container">
    <input
      type="text"
      class="search-box"
      placeholder="🔍 Rechercher un bon plan..."
    />
  </div>

  <div class="cards">

    <div class="card">
      <div class="badge">-50%</div>
      <div class="title">1. Pizza</div>
      <div class="city">Paris</div>
      <div class="rating">⭐ 4.8</div>
    </div>

    <div class="card">
      <div class="badge">Gratuit</div>
      <div class="title">2. Cinéma</div>
      <div class="city">Lyon</div>
      <div class="rating">⭐ 4.7</div>
    </div>

    <div class="card">
      <div class="badge">Gratuit</div>
      <div class="title">3. Parking</div>
      <div class="city">Marseille</div>
      <div class="rating">⭐ 4.6</div>
    </div>

  </div>

</body>
</html>
