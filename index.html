<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DealSpot</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background-color: #f4f6f8;
      color: #1f2933;
    }

    header {
      background: white;
      padding: 18px 16px 6px 16px;
      text-align: center;
      font-size: 24px;
      font-weight: 700;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .nav {
      display: flex;
      gap: 10px;
      justify-content: center;
      padding: 12px;
      background: white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
      flex-wrap: wrap;
    }

    .nav button {
      border: none;
      padding: 10px 16px;
      border-radius: 20px;
      background: #e5e7eb;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .nav button.active {
      background: #2563eb;
      color: white;
    }

    .search-container {
      padding: 14px;
    }

    .search-box {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid #d1d5db;
      font-size: 15px;
      outline: none;
    }

    .page {
      display: none;
      padding: 10px 14px 30px 14px;
    }

    .page.active {
      display: block;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 6px 14px rgba(0,0,0,0.08);
      margin-bottom: 14px;
    }

    .badge {
      display: inline-block;
      background: #dc2626;
      color: white;
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 10px;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .city {
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .form input, .form button {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      font-size: 14px;
    }

    .form button {
      background: #2563eb;
      color: white;
      font-weight: 600;
      border: none;
    }

  </style>
</head>

<body>

  <header>DealSpot</header>

  <div class="nav">
    <button class="active" onclick="showPage('top', this)">🏆 Top</button>
    <button onclick="showPage('liste', this)">📋 Liste</button>
    <button onclick="showPage('ajouter', this)">➕ Ajouter</button>
  </div>

  <div class="search-container">
    <input
      type="text"
      class="search-box"
      placeholder="🔍 Rechercher un bon plan..."
    />
  </div>

  <!-- PAGE TOP -->
  <div id="top" class="page active">

    <div id="dealsContainer"></div>

  </div>

  <!-- PAGE LISTE -->
  <div id="liste" class="page">

    <div id="dealsList"></div>

  </div>

  <!-- PAGE AJOUTER -->
  <div id="ajouter" class="page">

    <div class="card">

      <div class="title">Ajouter un bon plan</div>

      <div class="form">

        <input id="dealName" type="text" placeholder="Nom du bon plan" />

        <input id="dealCity" type="text" placeholder="Ville" />

        <input id="dealDiscount" type="text" placeholder="Réduction (ex: -30%)" />

        <button onclick="addDeal()">Ajouter</button>

      </div>

    </div>

  </div>

  <script>

    function showPage(pageId, button) {

      let pages = document.querySelectorAll('.page');
      pages.forEach(p => p.classList.remove('active'));

      document.getElementById(pageId).classList.add('active');

      let buttons = document.querySelectorAll('.nav button');
      buttons.forEach(b => b.classList.remove('active'));

      button.classList.add('active');

    }

    function loadDeals() {

      let deals = JSON.parse(localStorage.getItem('deals')) || [];

      let container = document.getElementById('dealsContainer');
      let list = document.getElementById('dealsList');

      container.innerHTML = '';
      list.innerHTML = '';

      deals.sort((a, b) => (b.likes || 0) - (a.likes || 0));

      deals.forEach((deal, index) => {

        let html = `

          <div class="card">
            <div class="badge">${deal.discount}</div>
            <div class="title">${deal.name}</div>
            <div class="city">${deal.city}</div>
            <button onclick="likeDeal(${index})">👍 ${deal.likes || 0}</button>
            <button onclick="commentDeal(${index})">💬 Commenter</button>
            <div class="comments">${(deal.comments || []).map(c => `<div class='comment'>${c}</div>`).join('')}</div>(${index})">👍 ${deal.likes || 0}</button>
          </div>

        `;

        container.innerHTML += html;
        list.innerHTML += html;

      });

      let deals = JSON.parse(localStorage.getItem('deals')) || [];

      let container = document.getElementById('dealsContainer');
      let list = document.getElementById('dealsList');

      container.innerHTML = '';
      list.innerHTML = '';

      deals.forEach(deal => {

        let html = `

          <div class="card">
            <div class="badge">${deal.discount}</div>
            <div class="title">${deal.name}</div>
            <div class="city">${deal.city}</div>
          </div>

        `;

        container.innerHTML += html;
        list.innerHTML += html;

      });

    }

    function addDeal() {

      let name = document.getElementById('dealName').value;
      let city = document.getElementById('dealCity').value;
      let discount = document.getElementById('dealDiscount').value;

      if (!name || !city || !discount) {
        alert('Remplis tous les champs');
        return;
      }

      let deals = JSON.parse(localStorage.getItem('deals')) || [];

      deals.push({
        name: name,
        city: city,
        discount: discount,
        likes: 0
      });
        name: name,
        city: city,
        discount: discount
      });

      localStorage.setItem('deals', JSON.stringify(deals));

      document.getElementById('dealName').value = '';
      document.getElementById('dealCity').value = '';
      document.getElementById('dealDiscount').value = '';

      function commentDeal(index) {

      let deals = JSON.parse(localStorage.getItem('deals')) || [];

      let text = prompt("Votre commentaire :");

      if (!text) return;

      if (!deals[index].comments) {
        deals[index].comments = [];
      }

      deals[index].comments.push(text);

      localStorage.setItem('deals', JSON.stringify(deals));

      loadDeals();

    }

    function likeDeal(index) {

      let deals = JSON.parse(localStorage.getItem('deals')) || [];

      if (!deals[index].likes) {
        deals[index].likes = 0;
      }

      deals[index].likes += 1;

      localStorage.setItem('deals', JSON.stringify(deals));

      loadDeals();

    }

    loadDeals();

      alert('Deal enregistré');

    }

    loadDeals();

  </script>

</body>
</html>
