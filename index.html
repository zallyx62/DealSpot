<!DOCTYPE html><html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DealSpot</title>  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background-color: #f4f6f8;
      color: #1f2933;
    }

    header {
      background: white;
      padding: 18px 16px 6px 16px;
      text-align: center;
      font-size: 24px;
      font-weight: 700;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .location {
      font-size: 13px;
      color: #6b7280;
      margin-top: 4px;
    }

    .nav {
      display: flex;
      gap: 10px;
      justify-content: center;
      padding: 12px;
      background: white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
      flex-wrap: wrap;
    }

    .nav button {
      border: none;
      padding: 10px 16px;
      border-radius: 20px;
      background: #e5e7eb;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .nav button.active {
      background: #2563eb;
      color: white;
    }

    .search-container {
      padding: 14px;
    }

    .search-box {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid #d1d5db;
      font-size: 15px;
      outline: none;
    }

    .page {
      display: none;
      padding: 10px 14px 30px 14px;
    }

    .page.active {
      display: block;
    }

    .card {
      background: white;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 6px 14px rgba(0,0,0,0.08);
      margin-bottom: 16px;
    }

    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }

    .card-content {
      padding: 14px;
    }

    .badge {
      display: inline-block;
      background: #dc2626;
      color: white;
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 10px;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .city {
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .rating {
      font-size: 15px;
      font-weight: 600;
    }

    .form input, .form button {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      font-size: 14px;
    }

    .form button {
      background: #2563eb;
      color: white;
      font-weight: 600;
      border: none;
    }

    .geo-btn {
      background: #10b981;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 10px;
      font-weight: 600;
      margin-bottom: 10px;
    }

  </style></head><body>  <header>
    DealSpot
    <div id="userLocation" class="location">Localisation inconnue</div>
  </header>  <div class="nav">
    <button class="active" onclick="showPage('top', this)">🏆 Top</button>
    <button onclick="showPage('liste', this)">📋 Liste</button>
    <button onclick="showPage('avis', this)">⭐ Avis</button>
    <button onclick="showPage('ajouter', this)">➕ Ajouter</button>
  </div>  <div class="search-container">
    <input
      type="text"
      class="search-box"
      placeholder="🔍 Rechercher un bon plan..."
    />
  </div>  <!-- PAGE TOP -->  <div id="top" class="page active"><div class="card">
  <img src="https://images.unsplash.com/photo-1601924582975-7e6b0f7d3c4f" />
  <div class="card-content">
    <div class="badge">-50%</div>
    <div class="title">Pizza</div>
    <div class="city">Paris</div>
    <div class="rating">⭐ 4.8</div>
  </div>
</div>

  </div>  <!-- PAGE AJOUTER -->  <div id="ajouter" class="page"><div class="card">
  <div class="card-content">
    <div class="title">Ajouter un bon plan</div>

    <div class="form">

      <button class="geo-btn" onclick="getLocation()">
        📍 Utiliser ma position
      </button>

      <input id="dealName" type="text" placeholder="Nom du bon plan" />

      <input id="dealCity" type="text" placeholder="Ville" />

      <input type="text" placeholder="Réduction (ex: -30%)" />

      <button>Ajouter</button>

    </div>

  </div>
</div>

  </div>  <script>

    function showPage(pageId, button) {

      let pages = document.querySelectorAll('.page');
      pages.forEach(p => p.classList.remove('active'));

      document.getElementById(pageId).classList.add('active');

      let buttons = document.querySelectorAll('.nav button');
      buttons.forEach(b => b.classList.remove('active'));

      button.classList.add('active');

    }

    function getLocation() {

      if (navigator.geolocation) {

        navigator.geolocation.getCurrentPosition(function(position) {

          let lat = position.coords.latitude;
          let lon = position.coords.longitude;

          document.getElementById("userLocation").innerText =
            "Position détectée";

          document.getElementById("dealCity").value =
            "Ville détectée automatiquement";

        }, function() {

          alert("Impossible d'obtenir la localisation");

        });

      } else {

        alert("Géolocalisation non supportée");

      }

    }

  </script></body>
</html>
